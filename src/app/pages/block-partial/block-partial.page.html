<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/ai-demo"></ion-back-button>
    </ion-buttons>
    <ion-title>Block Partial</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Scenario 3: Block @ai-generated-begin/end</ion-card-title>
      <ion-card-subtitle>Only lines between markers count as AI</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-button (click)="run()">Run</ion-button>
      <p *ngIf="result.length">Result: {{ result.join(', ') }}</p>
    </ion-card-content>
  </ion-card>
</ion-content>
