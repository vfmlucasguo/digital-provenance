<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/ai-demo"></ion-back-button>
    </ion-buttons>
    <ion-title>Inline Partial</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Scenario 5: Inline/trailing @ai-generated</ion-card-title>
      <ion-card-subtitle>Only the line with marker counts as AI</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-button (click)="run()">Run</ion-button>
      <p *ngIf="formatted">Formatted: "{{ formatted }}"</p>
      <p *ngIf="parsed">Parsed: {{ parsed }}</p>
    </ion-card-content>
  </ion-card>
</ion-content>
