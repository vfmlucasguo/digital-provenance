<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/ai-demo"></ion-back-button>
    </ion-buttons>
    <ion-title>No AI</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Scenario 6: No AI markers</ion-card-title>
      <ion-card-subtitle>Baseline - all lines count as human-written</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-button (click)="run()">Run</ion-button>
      <p *ngIf="status">Status: {{ status }}</p>
      <p *ngIf="sum">Sum: {{ sum }}</p>
    </ion-card-content>
  </ion-card>
</ion-content>
