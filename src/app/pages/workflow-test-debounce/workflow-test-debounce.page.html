<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/ai-demo"></ion-back-button>
    </ion-buttons>
    <ion-title>Workflow Test 1</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Workflow Test: Inline debounce</ion-card-title>
      <ion-card-subtitle>Inline @ai-generated on single line</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-button (click)="run()">Run</ion-button>
      <p *ngIf="result">Result: {{ result }}</p>
    </ion-card-content>
  </ion-card>
</ion-content>
