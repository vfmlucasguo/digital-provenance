<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/ai-demo"></ion-back-button>
    </ion-buttons>
    <ion-title>Whole by Path</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Scenario 1: Path contains ai-gen</ion-card-title>
      <ion-card-subtitle>Entire file counts as AI (src/app/services/ai-gen/*)</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-button (click)="run()">Run</ion-button>
      <p *ngIf="result">Result: {{ result }}</p>
    </ion-card-content>
  </ion-card>
</ion-content>
