<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/ai-demo"></ion-back-button>
    </ion-buttons>
    <ion-title>PR Test 2</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>PR Test: Block validator</ion-card-title>
      <ion-card-subtitle>@ai-generated-begin/end block</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-button (click)="run()">Validate</ion-button>
      <p *ngIf="result">{{ result }}</p>
    </ion-card-content>
  </ion-card>
</ion-content>
