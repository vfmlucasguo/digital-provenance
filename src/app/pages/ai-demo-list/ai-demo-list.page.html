<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>AI Demo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    <ion-list-header>
      <ion-label>AI Code Statistics Scenarios</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let s of scenarios" [routerLink]="s.path" button detail>
      <ion-label>
        <h2>{{ s.title }}</h2>
        <p>{{ s.desc }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
