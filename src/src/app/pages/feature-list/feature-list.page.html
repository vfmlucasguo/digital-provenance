<!-- @ai-generated-begin -->
<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Features</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    <ion-list-header>
      <ion-label>App Features</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let feature of features" detail="false">
      <ion-label>
        <h2>{{ feature.title }}</h2>
        <p>{{ feature.description }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
<!-- @ai-generated-end -->
